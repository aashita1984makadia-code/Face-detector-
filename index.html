<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceGate AI - Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .video-container { position: relative; display: flex; justify-content: center; align-items: center; background: #000; border-radius: 0.5rem; overflow: hidden; }
        video { border-radius: 0.5rem; object-fit: cover; width: 100%; max-width: 640px; height: auto; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 50; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 1rem; border-radius: 0.375rem; color: white; font-weight: 500; opacity: 0; transform: translateY(100%); animation: slideIn 0.3s forwards; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.info { background-color: #3b82f6; }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; } }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .summary-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .summary-card:hover { transform: translateX(5px); }
        .active-work { border-left-color: #10b981; background-color: #f0fdf4; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-blue-600 text-white shadow-lg shrink-0">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-face-viewfinder text-yellow-400"></i> FaceGate AI
            </div>
            <div class="flex gap-2">
                <button onclick="switchView('attendance')" id="btn-attendance" class="px-3 py-2 rounded bg-blue-700 hover:bg-blue-800 transition text-sm font-semibold">
                    <i class="fa-solid fa-clock mr-1"></i> Attendance
                </button>
                <button onclick="switchView('admin')" id="btn-admin" class="px-3 py-2 rounded hover:bg-blue-800 transition text-sm font-semibold">
                    <i class="fa-solid fa-user-shield mr-1"></i> Admin Panel
                </button>
            </div>
        </div>
    </nav>

    <!-- Global Loading Screen -->
    <div id="loading-screen" class="flex-1 flex flex-col items-center justify-center bg-white z-50">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-semibold text-gray-700">Loading Face Recognition...</h2>
        <p class="text-gray-500 mt-2 text-center px-4">Initializing AI models for face tracking.</p>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 max-w-7xl mx-auto w-full p-4 overflow-y-auto hidden" id="main-content">
        
        <!-- ================= ATTENDANCE VIEW ================= -->
        <div id="view-attendance" class="space-y-6">
            <div class="bg-white p-4 rounded-lg shadow-md border-t-4 border-blue-500">
                <div class="text-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800">Live Scanner</h2>
                    <p class="text-gray-500 text-sm">Automated Check-In / Check-Out</p>
                </div>
                
                <div class="video-container mx-auto" id="attendance-video-container">
                    <video id="attendance-video" autoplay muted playsinline></video>
                    <canvas id="attendance-canvas"></canvas>
                </div>
            </div>

            <div class="bg-white p-4 rounded-lg shadow-md">
                <h3 class="text-lg font-bold mb-3 border-b pb-2 flex items-center gap-2">
                    <i class="fa-solid fa-history text-blue-500"></i> Live Activity Feed (12H)
                </h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-xs uppercase">
                                <th class="p-3 border-b">Time</th>
                                <th class="p-3 border-b">Employee</th>
                                <th class="p-3 border-b">Action</th>
                            </tr>
                        </thead>
                        <tbody id="activity-log" class="text-sm">
                            <tr><td colspan="3" class="p-8 text-center text-gray-400">Waiting for first scan...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ================= ADMIN VIEW ================= -->
        <div id="view-admin" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- Registration & Directory (Left Col) -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- Add Employee -->
                    <div class="bg-white p-4 rounded-lg shadow-md">
                        <h2 class="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                            <i class="fa-solid fa-user-plus text-green-500"></i> New Employee
                        </h2>
                        <div class="video-container mb-4 w-full">
                            <video id="admin-video" autoplay muted playsinline class="w-full h-48"></video>
                            <canvas id="admin-canvas"></canvas>
                        </div>
                        <div class="space-y-3">
                            <input type="text" id="emp-id" class="w-full rounded border p-2 text-sm" placeholder="ID (e.g. 101)">
                            <input type="text" id="emp-name" class="w-full rounded border p-2 text-sm" placeholder="Full Name">
                            <button onclick="registerEmployee()" id="btn-register" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700 transition">
                                <i class="fa-solid fa-plus mr-1"></i> Register Face
                            </button>
                        </div>
                    </div>

                    <!-- Simple Directory -->
                    <div class="bg-white p-4 rounded-lg shadow-md overflow-hidden">
                        <div class="flex justify-between items-center mb-3">
                            <h2 class="font-bold">Staff List</h2>
                            <button onclick="exportCSV()" class="text-xs bg-indigo-500 text-white px-2 py-1 rounded">
                                <i class="fa-solid fa-file-export"></i> All CSV
                            </button>
                        </div>
                        <div id="employee-list" class="space-y-2 max-h-64 overflow-y-auto pr-1">
                            <!-- List items here -->
                        </div>
                    </div>
                </div>

                <!-- Time & Attendance Summary (Right Col) -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white p-4 rounded-lg shadow-md min-h-[400px]">
                        <h2 class="text-xl font-bold mb-4 border-b pb-2 flex items-center justify-between">
                            <span class="flex items-center gap-2">
                                <i class="fa-solid fa-stopwatch text-orange-500"></i> Work Hours Summary
                            </span>
                            <span class="text-xs font-normal text-gray-500">Today: <span id="current-date"></span></span>
                        </h2>
                        
                        <div id="work-summary-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <!-- Dynamic summary cards -->
                            <div class="col-span-full py-20 text-center text-gray-400">
                                <i class="fa-solid fa-chart-pie text-4xl mb-2 opacity-20"></i>
                                <p>Register employees to see work durations.</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <div id="toast-container"></div>

    <script>
        // --- Core State ---
        let employees = []; // { id, name, descriptor, status: 'out', lastScan: 0 }
        let logs = []; // { timestamp, empId, name, action }
        let modelsLoaded = false;
        let currentStream = null;
        let attendanceInterval = null;
        let faceMatcher = null;
        const COOLDOWN_MS = 8000; 
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';

        // --- Init ---
        async function init() {
            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);
                modelsLoaded = true;
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('current-date').innerText = new Date().toLocaleDateString();
                switchView('attendance');
            } catch (err) {
                console.error(err);
                showToast("Hardware/Connection Error", "error");
            }
        }

        // --- Navigation ---
        async function switchView(view) {
            stopCamera();
            if (attendanceInterval) clearInterval(attendanceInterval);

            // UI toggles
            document.getElementById('view-attendance').classList.toggle('hidden', view !== 'attendance');
            document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
            
            if (view === 'attendance') {
                await startCamera('attendance-video');
                startAttendanceScanner();
            } else {
                await startCamera('admin-video');
                renderAdminUI();
            }
        }

        // --- Camera & AI ---
        async function startCamera(id) {
            const video = document.getElementById(id);
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = currentStream;
                return new Promise(r => video.onloadedmetadata = () => { video.play(); r(); });
            } catch (e) { showToast("Camera Access Denied", "error"); }
        }

        function stopCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
        }

        function updateFaceMatcher() {
            if (employees.length === 0) { faceMatcher = null; return; }
            const descriptors = employees.map(e => new faceapi.LabeledFaceDescriptors(e.id, [e.descriptor]));
            faceMatcher = new faceapi.FaceMatcher(descriptors, 0.55);
        }

        async function startAttendanceScanner() {
            const video = document.getElementById('attendance-video');
            const canvas = document.getElementById('attendance-canvas');
            
            attendanceInterval = setInterval(async () => {
                if (!video || video.paused) return;
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const dims = { width: video.videoWidth, height: video.videoHeight };
                if (dims.width === 0) return;

                faceapi.matchDimensions(canvas, dims);
                const resized = faceapi.resizeResults(detections, dims);
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (faceMatcher && resized.length > 0) {
                    resized.forEach(d => {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        if (match.label !== 'unknown') {
                            const emp = employees.find(e => e.id === match.label);
                            new faceapi.draw.DrawBox(d.detection.box, { label: emp.name, boxColor: '#10b981' }).draw(canvas);
                            processScan(emp);
                        } else {
                            new faceapi.draw.DrawBox(d.detection.box, { label: 'Unknown', boxColor: '#ef4444' }).draw(canvas);
                        }
                    });
                }
            }, 600);
        }

        function processScan(emp) {
            const now = Date.now();
            if (now - emp.lastScan < COOLDOWN_MS) return;

            emp.status = emp.status === 'out' ? 'in' : 'out';
            emp.lastScan = now;

            logs.unshift({ timestamp: now, empId: emp.id, name: emp.name, action: emp.status });
            if (logs.length > 100) logs.pop();

            showToast(`${emp.name}: Checked ${emp.status.toUpperCase()}`, emp.status === 'in' ? 'success' : 'info');
            renderActivityLog();
        }

        // --- Data & Reports ---
        function calculateSessions(empId) {
            const filtered = logs.filter(l => l.empId === empId).sort((a,b) => a.timestamp - b.timestamp);
            const sessions = [];
            let currentIn = null;
            filtered.forEach(log => {
                if (log.action === 'in') currentIn = log.timestamp;
                else if (log.action === 'out' && currentIn) {
                    sessions.push({ in: currentIn, out: log.timestamp });
                    currentIn = null;
                }
            });
            return { sessions, activeIn: currentIn };
        }

        function getDurationText(ms) {
            const mins = Math.floor(ms / 60000);
            return mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins}m`;
        }

        function format12h(ts) {
            return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // --- Admin UI Rendering ---
        function renderAdminUI() {
            renderEmployeeDirectory();
            renderWorkSummary();
        }

        function renderEmployeeDirectory() {
            const list = document.getElementById('employee-list');
            if (employees.length === 0) { list.innerHTML = `<p class="text-xs text-gray-400">Empty</p>`; return; }
            
            list.innerHTML = employees.map(e => `
                <div class="flex items-center justify-between p-2 bg-gray-50 rounded text-sm">
                    <div class="truncate">
                        <span class="font-bold text-blue-600">#${e.id}</span> ${e.name}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportCSV('${e.id}')" class="text-blue-500"><i class="fa-solid fa-download"></i></button>
                        <button onclick="deleteEmployee('${e.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderWorkSummary() {
            const container = document.getElementById('work-summary-container');
            if (employees.length === 0) return;

            container.innerHTML = employees.map(emp => {
                const { sessions, activeIn } = calculateSessions(emp.id);
                let totalMs = sessions.reduce((acc, s) => acc + (s.out - s.in), 0);
                
                // If currently working, add time spent so far
                const liveSession = activeIn ? (Date.now() - activeIn) : 0;
                const grandTotal = totalMs + liveSession;

                return `
                    <div class="summary-card p-4 rounded-lg border bg-white shadow-sm ${activeIn ? 'active-work' : ''}">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h4 class="font-bold text-lg">${emp.name}</h4>
                                <p class="text-xs text-gray-500">ID: ${emp.id}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs uppercase font-bold ${activeIn ? 'text-green-600' : 'text-gray-400'}">
                                    ${activeIn ? '<i class="fa-solid fa-circle-play"></i> On Clock' : 'Off Duty'}
                                </p>
                                <p class="text-xl font-black text-gray-800">${getDurationText(grandTotal)}</p>
                            </div>
                        </div>
                        
                        <div class="mt-3 space-y-1">
                            <p class="text-[10px] uppercase font-bold text-gray-400 mb-1">Today's Sessions</p>
                            ${sessions.length === 0 && !activeIn ? '<p class="text-xs text-gray-300 italic">No records for today</p>' : ''}
                            ${sessions.slice(-3).map(s => `
                                <div class="flex justify-between text-xs py-1 border-b border-gray-50 last:border-0">
                                    <span>${format12h(s.in)} - ${format12h(s.out)}</span>
                                    <span class="text-gray-400">${getDurationText(s.out - s.in)}</span>
                                </div>
                            `).join('')}
                            ${activeIn ? `
                                <div class="flex justify-between text-xs py-1 text-green-700 font-medium">
                                    <span>Started ${format12h(activeIn)}</span>
                                    <span class="animate-pulse">Live...</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderActivityLog() {
            const body = document.getElementById('activity-log');
            if (logs.length === 0) return;
            body.innerHTML = logs.map(l => `
                <tr class="border-b">
                    <td class="p-3 text-gray-500 font-mono">${format12h(l.timestamp)}</td>
                    <td class="p-3 font-semibold">${l.name}</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${l.action === 'in' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                            Check ${l.action}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // --- Actions ---
        async function registerEmployee() {
            const id = document.getElementById('emp-id').value.trim();
            const name = document.getElementById('emp-name').value.trim();
            if (!id || !name) return showToast("Enter Details", "error");
            
            const video = document.getElementById('admin-video');
            const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            if (!det) return showToast("Face not found", "error");

            employees.push({ id, name, descriptor: det.descriptor, status: 'out', lastScan: 0 });
            updateFaceMatcher();
            showToast(`Registered ${name}`, "success");
            renderAdminUI();
            document.getElementById('emp-id').value = '';
            document.getElementById('emp-name').value = '';
        }

        function deleteEmployee(id) {
            employees = employees.filter(e => e.id !== id);
            logs = logs.filter(l => l.empId !== id);
            updateFaceMatcher();
            renderAdminUI();
        }

        function exportCSV(id = null) {
            const list = id ? employees.filter(e => e.id === id) : employees;
            let csv = "Date,Employee,ID,Check In,Check Out,Duration\n";
            list.forEach(e => {
                const { sessions } = calculateSessions(e.id);
                sessions.forEach(s => {
                    csv += `"${new Date(s.in).toLocaleDateString()}","${e.name}","${e.id}","${format12h(s.in)}","${format12h(s.out)}","${getDurationText(s.out-s.in)}"\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = id ? `report_${id}.csv` : "all_staff_report.csv";
            a.click();
        }

        function showToast(msg, type) {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.animation = 'fadeOut 0.3s forwards'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
